{% extends 'base.html' %}

{% block content %}
  <h1 class="text-3xl font-bold text-center mb-6 text-gray-800">Registro</h1>

  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Usuario</label>
        {{ form.username }}
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Contraseña</label>
        {{ form.password1 }}
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Confirmar contraseña</label>
        {{ form.password2 }}
      </div>
    </div>
    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">Crear cuenta</button>
  </form>

  <p class="text-center mt-4 text-sm text-gray-600">
    ¿Ya tienes cuenta?
    <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Inicia sesión</a>
  </p>
{% endblock %}
